<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum Reset</title>
    <link rel="stylesheet" href="styles.css">  
    <style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f5f5f5;
        color: #333;
        margin: 0;
        padding: 0;
    }
    header {
        background-color: #4CAF50;
        color: white;
        padding: 20px;
        text-align: center;
    }
    h1 {
        font-size: 2.5em;
        margin: 0;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .container {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: white;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        transition: transform 0.3s;
    }
    .container:hover {
        transform: scale(1.02);
    }
    button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s, transform 0.3s;
    }
    button:hover {
        background-color: #45a049;
        transform: translateY(-2px);
    }
    footer {
        text-align: center;
        padding: 10px 0;
        background-color: #4CAF50;
        color: white;
        position: relative;
        bottom: 0;
        width: 100%;
    }
    </style>
</head>
<body>
<header>
    <h1>Momentum Reset</h1>
</header>
<div class="container">
    <h2>Welcome!</h2>
    <p>Reset your momentum with our improved interface. We've made enhancements just for you!</p>
    <button type="button">Get Started</button>
</div>
<footer>
    <p>&copy; 2026 Momentum Reset. All Rights Reserved.</p>
</footer>
</body>
</html>
